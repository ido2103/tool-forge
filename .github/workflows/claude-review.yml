name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip drafts (reviewed once via ready_for_review) and fork PRs
    # (secrets are not available to pull_request runs from forks).
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The PR branch is checked out in the
            working directory.

            Read REVIEW.md at the repository root and apply its criteria,
            its "what not to flag" rules, and its reporting format.

            Post the review to GitHub:
            - Use mcp__github_inline_comment__create_inline_comment (with
              confirmed: true) to flag specific lines.
            - Use `gh pr comment` for a short top-level summary.
            Only post GitHub comments — do not emit review text as plain
            messages.
          claude_args: |
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
